####### Global Parameters #########

#!define WITH_WEBSOCKETS
#!define WITH_TLS

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0

children=2
tcp_children=2

listen=udp:0.0.0.0:5060
#!ifdef WITH_WEBSOCKETS
listen=tls:0.0.0.0:443
#!endif

####### Modules Section ########

loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "sdpops.so"

#!ifdef WITH_TLS
loadmodule "tls.so"
modparam("tls", "certificate", "/etc/kamailio/tls/fullchain.pem")
modparam("tls", "private_key", "/etc/kamailio/tls/privkey.pem")
modparam("tls", "tls_force_run", 1)
#!endif

#!ifdef WITH_WEBSOCKETS
loadmodule "websocket.so"
loadmodule "xhttp.so"
#!endif

#### Transaction Module
modparam("tm", "fr_timer", 5000)
modparam("tm", "fr_inv_timer", 30000)

#### Record-Route Module
modparam("rr", "append_fromtag", 1)

#### RTPEngine Module
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:2223")

#### NAT Helper
modparam("nathelper", "received_avp", "$avp(received)")

####### Routing Logic ########

request_route {
    # Per-request initial checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Sanity checks
    if (!sanity_check("1511", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # Handle CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Absorb retransmissions
    t_check_trans();

    # Handle sequential requests (in-dialog)
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("INVITE")) {
                route(RELAY_MEDIA);
            } else if (is_method("BYE|CANCEL")) {
                rtpengine_delete();
            }
            route(RELAY);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    t_relay();
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply("404", "Not here");
        }
        exit;
    }

    # Handle initial requests

    # Record-route all requests
    record_route();

    # Handle REGISTER (accept but don't store - anonymous mode)
    if (is_method("REGISTER")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Handle INVITE
    if (is_method("INVITE")) {
        route(RELAY_MEDIA);
    }

    # Handle OPTIONS (keepalive)
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    route(RELAY);
}

route[RELAY_MEDIA] {
    # WebRTC side (browser) uses DTLS-SRTP, ICE
    # FreeSWITCH side uses plain RTP

    if ($proto == "wss" || $proto == "ws") {
        # Incoming from WebRTC browser - offer plain RTP to FreeSWITCH
        rtpengine_offer("RTP/AVP replace-origin replace-session-connection ICE=remove");
    } else {
        # Incoming from FreeSWITCH - offer SRTP to browser
        rtpengine_offer("RTP/SAVPF replace-origin replace-session-connection ICE=force DTLS=passive");
    }
}

route[RELAY] {
    # Set destination to FreeSWITCH
    $du = "sip:freeswitch:5060";

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    # Handle SDP in responses
    if (has_body("application/sdp")) {
        if ($proto == "wss" || $proto == "ws") {
            # Response going to WebRTC browser
            rtpengine_answer("RTP/SAVPF replace-origin replace-session-connection ICE=force DTLS=passive");
        } else {
            # Response going to FreeSWITCH
            rtpengine_answer("RTP/AVP replace-origin replace-session-connection ICE=remove");
        }
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_was_cancelled()) {
        rtpengine_delete();
        exit;
    }
}

#!ifdef WITH_WEBSOCKETS
event_route[xhttp:request] {
    # Handle WebSocket upgrade requests
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade") {
        xlog("L_INFO", "WebSocket connection from $si:$sp\n");
        if (ws_handle_handshake()) {
            exit;
        }
    }
    xhttp_reply("404", "Not Found", "text/html", "<html><body>Not found</body></html>");
}
#!endif
