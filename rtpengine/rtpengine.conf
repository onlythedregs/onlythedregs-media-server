[rtpengine]
# Interface configuration
# internal = Docker network IP (auto-detected)
# external = Public IP for WebRTC clients
interface = internal/eth0;external/${PUBLIC_IP}

# Control socket for OpenSIPS
listen-ng = 0.0.0.0:2223

# UDP port range for RTP/SRTP
port-min = 10000
port-max = 20000

# Timeout settings
timeout = 60
silent-timeout = 300

# DTLS-SRTP for WebRTC (certificates auto-generated)
dtls-passive = true
dtls-cert = /etc/rtpengine/certs/dtls-cert.pem
dtls-key = /etc/rtpengine/certs/dtls-key.pem

# Logging
log-level = 6
log-stderr = true

# Disable kernel module (not available in Docker)
table = -1

# Delete delay for call cleanup
delete-delay = 0

# Codec handling
# Allow transcoding if needed (VP8 <-> H264)
# For now, pass-through only
