name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'kamailio/**'
      - 'rtpengine/**'
      - 'freeswitch/**'
      - 'docker-compose*.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'kamailio/**'
      - 'rtpengine/**'
      - 'freeswitch/**'
      - 'docker-compose*.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kamailio: ${{ steps.filter.outputs.kamailio }}
      rtpengine: ${{ steps.filter.outputs.rtpengine }}
      freeswitch: ${{ steps.filter.outputs.freeswitch }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect changed paths
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          kamailio:
            - 'kamailio/**'
            - '.github/workflows/build.yml'
          rtpengine:
            - 'rtpengine/**'
            - '.github/workflows/build.yml'
          freeswitch:
            - 'freeswitch/**'
            - '.github/workflows/build.yml'

  build:
    needs: changes
    if: needs.changes.outputs.kamailio == 'true' || needs.changes.outputs.rtpengine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [kamailio, rtpengine]

    steps:
    - name: Check if service changed
      id: should_build
      run: |
        if [ "${{ matrix.service }}" = "kamailio" ]; then
          echo "build=${{ needs.changes.outputs.kamailio }}" >> "$GITHUB_OUTPUT"
        elif [ "${{ matrix.service }}" = "rtpengine" ]; then
          echo "build=${{ needs.changes.outputs.rtpengine }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout repository
      if: steps.should_build.outputs.build == 'true'
      uses: actions/checkout@v4

    - name: Set up QEMU
      if: steps.should_build.outputs.build == 'true'
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      if: steps.should_build.outputs.build == 'true'
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: steps.should_build.outputs.build == 'true'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      if: steps.should_build.outputs.build == 'true'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=${{ matrix.service }}
          org.opencontainers.image.description=OnlyTheDregs Media Server - ${{ matrix.service }}

    - name: Build and push Docker image
      if: steps.should_build.outputs.build == 'true'
      uses: docker/build-push-action@v6
      with:
        context: ./${{ matrix.service }}
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

  build-freeswitch:
    needs: changes
    if: needs.changes.outputs.freeswitch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/freeswitch
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=latest,enable={{is_default_branch}}
        labels: |
          org.opencontainers.image.title=freeswitch
          org.opencontainers.image.description=OnlyTheDregs Media Server - freeswitch

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./freeswitch
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        no-cache: true
        build-args: |
          BUILDKIT_INLINE_CACHE=1
        secrets: |
          sw_token=${{ secrets.SIGNALWIRE_TOKEN }}