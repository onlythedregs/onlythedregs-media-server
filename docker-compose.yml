version: '3.8'

services:
  opensips:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/opensips:latest
    build: ./opensips
    container_name: opensips
    restart: unless-stopped
    ports:
      - "443:443"      # WSS for WebRTC clients
      - "5060:5060/udp" # SIP (for debugging)
    volumes:
      - ./certs:/etc/opensips/tls:ro
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
    depends_on:
      - rtpengine
      - freeswitch
    networks:
      - sipnet

  rtpengine:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/rtpengine:latest
    build: ./rtpengine
    container_name: rtpengine
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - INTERNAL_IP=${INTERNAL_IP:-auto}
    volumes:
      - ./certs:/etc/rtpengine/certs:ro

  freeswitch:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/freeswitch:latest
    build: ./freeswitch
    container_name: freeswitch
    restart: unless-stopped
    volumes:
      - ./freeswitch/videos:/videos:ro
    networks:
      - sipnet
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sipnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
