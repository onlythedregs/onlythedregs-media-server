####### Global Parameters #########

log_level=3
xlog_level=3
stderror_enabled=no
syslog_enabled=yes
syslog_facility=LOG_LOCAL0

udp_workers=2
tcp_workers=2

socket=wss:0.0.0.0:443
socket=udp:0.0.0.0:5060

####### Modules Section ########

# Module path auto-detected by OpenSIPS (works on both x86_64 and aarch64)

#### Core Modules
loadmodule "proto_udp.so"
loadmodule "proto_wss.so"
loadmodule "signaling.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "sipmsgops.so"
loadmodule "uri.so"

#### TLS Module
loadmodule "tls_mgm.so"
modparam("tls_mgm", "server_domain", "default")
modparam("tls_mgm", "certificate", "/etc/opensips/tls/fullchain.pem")
modparam("tls_mgm", "private_key", "/etc/opensips/tls/privkey.pem")
modparam("tls_mgm", "match_ip_address", "[default]*")
modparam("tls_mgm", "match_sip_domain", "[default]*")

#### Transaction Module
modparam("tm", "fr_timeout", 5)
modparam("tm", "fr_inv_timeout", 30)

#### Record-Route Module
modparam("rr", "append_fromtag", 1)

#### RTPEngine Module
loadmodule "rtpengine.so"
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:2223")

####### Routing Logic ########

route {
    # Initial request handling
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    # Handle CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Absorb retransmissions
    t_check_trans();

    # Handle sequential requests (in-dialog)
    if (has_totag()) {
        if (loose_route()) {
            # In-dialog request - handle RTPEngine for re-INVITEs
            if (is_method("INVITE")) {
                route(relay_media);
            } else if (is_method("BYE|CANCEL")) {
                # Terminate RTPEngine session
                rtpengine_delete();
            }
            route(relay);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    t_relay();
                    exit;
                } else {
                    exit;
                }
            }
            sl_send_reply(404, "Not here");
        }
        exit;
    }

    # Handle initial requests
    
    # Record-route all requests
    record_route();

    # Handle REGISTER (accept but don't store - anonymous mode)
    if (is_method("REGISTER")) {
        sl_send_reply(200, "OK");
        exit;
    }

    # Handle INVITE
    if (is_method("INVITE")) {
        # Engage RTPEngine for WebRTC -> RTP bridging
        route(relay_media);
    }

    # Handle OPTIONS (keepalive)
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "OK");
        exit;
    }

    route(relay);
}

route[relay_media] {
    # WebRTC side (browser) uses DTLS-SRTP, ICE
    # FreeSwitch side uses plain RTP
    
    if ($socket_in(proto) == "WSS" || $socket_in(proto) == "WS") {
        # Incoming from WebRTC browser - offer RTP to FreeSwitch
        rtpengine_offer("RTP/AVP replace-origin replace-session-connection ICE=remove");
    } else {
        # Incoming from FreeSwitch - offer SRTP to browser  
        rtpengine_offer("RTP/SAVPF replace-origin replace-session-connection ICE=force DTLS=passive");
    }
}

route[relay] {
    # Set destination to FreeSwitch
    $du = "sip:freeswitch:5060";
    
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    # Handle SDP in responses
    if (has_body("application/sdp")) {
        if ($socket_in(proto) == "WSS" || $socket_in(proto) == "WS") {
            # Response going to WebRTC browser
            rtpengine_answer("RTP/SAVPF replace-origin replace-session-connection ICE=force DTLS=passive");
        } else {
            # Response going to FreeSwitch
            rtpengine_answer("RTP/AVP replace-origin replace-session-connection ICE=remove");
        }
    }
}

failure_route {
    if (t_was_cancelled()) {
        rtpengine_delete();
        exit;
    }
}
