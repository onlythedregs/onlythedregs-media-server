version: '3.8'

services:
  kamailio:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/kamailio:latest
    build: 
      context: ./kamailio
      dockerfile: Dockerfile
    container_name: kamailio
    restart: unless-stopped
    ports:
      - "443:443"      # WSS for WebRTC clients
      - "5060:5060/udp" # SIP (optional for debugging)
    volumes:
      - ./certs:/etc/kamailio/tls:ro
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
      # Pi-specific: Ensure proper memory allocation
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      - rtpengine
      - freeswitch
    networks:
      - sipnet

  rtpengine:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/rtpengine:latest
    build: 
      context: ./rtpengine
      dockerfile: Dockerfile
    container_name: rtpengine
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - INTERNAL_IP=${INTERNAL_IP}
    volumes:
      - ./certs:/etc/rtpengine/certs:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  freeswitch:
    image: ghcr.io/onlythedregs/onlythedregs-media-server/freeswitch:latest
    build: 
      context: ./freeswitch
      dockerfile: Dockerfile
    container_name: freeswitch
    restart: unless-stopped
    volumes:
      - ./freeswitch/videos:/videos:ro
      # Pi optimization: Use tmpfs for temporary files
      - /tmp/freeswitch:/tmp:rw
    environment:
      # Reduce log verbosity on Pi to save I/O
      - FS_LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - sipnet
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 60s  # Reduced frequency for Pi
      timeout: 15s
      retries: 3
      start_period: 30s

networks:
  sipnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1